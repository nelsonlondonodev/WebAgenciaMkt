<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
  <div class="text-center mb-16">
    <h2 class="section-title text-4xl sm:text-5xl scroll-animate-initial">
      Contacta para tu proyecto web
    </h2>
    <p class="section-subtitle text-base sm:text-lg max-w-2xl mx-auto">
      ¿Listo para iniciar tu próximo proyecto o tienes alguna pregunta? Estamos
      aquí para ayudarte a llevar tu presencia digital al siguiente nivel.
    </p>
  </div>

  <div class="mt-12 max-w-3xl mx-auto">
    <!-- Tarjeta Formulario con Glassmorphism Real -->
    <div
      class="bg-white/70 dark:bg-gray-900/40 backdrop-blur-xl rounded-[2.5rem] shadow-[0_32px_64px_-15px_rgba(0,0,0,0.1)] dark:shadow-[0_32px_64px_-15px_rgba(0,0,0,0.5)] p-8 sm:p-12 border border-white/40 dark:border-white/10 relative overflow-hidden scroll-animate-initial"
    >
      <!-- Decoraciones de fondo internas -->
      <div
        class="absolute top-0 right-0 w-64 h-64 bg-primary-blue/5 rounded-full blur-3xl -mr-32 -mt-32 pointer-events-none"
      ></div>
      <div
        class="absolute bottom-0 left-0 w-64 h-64 bg-primary-green/5 rounded-full blur-3xl -ml-32 -mb-32 pointer-events-none"
      ></div>

      <form
        id="contact-form"
        action="https://n8n.srv1033442.hstgr.cloud/webhook/webhook-formulario-web"
        method="POST"
        class="grid grid-cols-1 gap-y-8 relative z-10"
      >
        <!-- Campo Nombre -->
        <div class="relative group scroll-animate-initial">
          <input
            type="text"
            name="name"
            id="name"
            autocomplete="name"
            class="peer block w-full appearance-none rounded-2xl border border-gray-200/50 bg-gray-50/30 dark:bg-white/5 px-6 py-5 text-gray-900 placeholder-transparent transition-all duration-300 focus:border-primary-blue focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary-blue/5 dark:border-white/10 dark:text-white dark:focus:border-primary-green dark:focus:bg-gray-800/50 dark:focus:ring-primary-green/5"
            placeholder="Nombre"
            required
          />
          <label
            for="name"
            class="pointer-events-none absolute left-6 top-5 origin-[0_0] -translate-y-8 scale-75 text-xs font-bold uppercase tracking-wider text-gray-500 transition-all duration-300 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-base peer-placeholder-shown:font-normal peer-placeholder-shown:text-gray-400 peer-focus:-translate-y-8 peer-focus:scale-75 peer-focus:text-primary-blue dark:text-gray-400 dark:peer-focus:text-primary-green"
            >Nombre completo</label
          >
        </div>

        <!-- Campo Email -->
        <div class="relative group scroll-animate-initial delay-100">
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            class="peer block w-full appearance-none rounded-2xl border border-gray-200/50 bg-gray-50/30 dark:bg-white/5 px-6 py-5 text-gray-900 placeholder-transparent transition-all duration-300 focus:border-primary-blue focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary-blue/5 dark:border-white/10 dark:text-white dark:focus:border-primary-green dark:focus:bg-gray-800/50 dark:focus:ring-primary-green/5"
            placeholder="Email"
            required
          />
          <label
            for="email"
            class="pointer-events-none absolute left-6 top-5 origin-[0_0] -translate-y-8 scale-75 text-xs font-bold uppercase tracking-wider text-gray-500 transition-all duration-300 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-base peer-placeholder-shown:font-normal peer-placeholder-shown:text-gray-400 peer-focus:-translate-y-8 peer-focus:scale-75 peer-focus:text-primary-blue dark:text-gray-400 dark:peer-focus:text-primary-green"
            >Correo electrónico</label
          >
        </div>

        <!-- Campo Teléfono -->
        <div class="relative group scroll-animate-initial delay-200">
          <input
            type="tel"
            name="phone"
            id="phone"
            autocomplete="tel"
            class="peer block w-full appearance-none rounded-2xl border border-gray-200/50 bg-gray-50/30 dark:bg-white/5 px-6 py-5 text-gray-900 placeholder-transparent transition-all duration-300 focus:border-primary-blue focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary-blue/5 dark:border-white/10 dark:text-white dark:focus:border-primary-green dark:focus:bg-gray-800/50 dark:focus:ring-primary-green/5"
            placeholder="Teléfono"
          />
          <label
            for="phone"
            class="pointer-events-none absolute left-6 top-5 origin-[0_0] -translate-y-8 scale-75 text-xs font-bold uppercase tracking-wider text-gray-500 transition-all duration-300 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-base peer-placeholder-shown:font-normal peer-placeholder-shown:text-gray-400 peer-focus:-translate-y-8 peer-focus:scale-75 peer-focus:text-primary-blue dark:text-gray-400 dark:peer-focus:text-primary-green"
            >Teléfono (opcional)</label
          >
        </div>

        <!-- Campo Mensaje -->
        <div class="relative group scroll-animate-initial delay-300">
          <textarea
            id="message"
            name="message"
            rows="4"
            class="peer block w-full appearance-none rounded-2xl border border-gray-200/50 bg-gray-50/30 dark:bg-white/5 px-6 py-5 text-gray-900 placeholder-transparent transition-all duration-300 focus:border-primary-blue focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary-blue/5 dark:border-white/10 dark:text-white dark:focus:border-primary-green dark:focus:bg-gray-800/50 dark:focus:ring-primary-green/5 resize-none"
            placeholder="Mensaje"
            required
          ></textarea>
          <label
            for="message"
            class="pointer-events-none absolute left-6 top-5 origin-[0_0] -translate-y-8 scale-75 text-xs font-bold uppercase tracking-wider text-gray-500 transition-all duration-300 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-base peer-placeholder-shown:font-normal peer-placeholder-shown:text-gray-400 peer-focus:-translate-y-8 peer-focus:scale-75 peer-focus:text-primary-blue dark:text-gray-400 dark:peer-focus:text-primary-green"
            >¿Cómo podemos ayudarte?</label
          >
        </div>

        <!-- Botón Submit con Gradiente Hero -->
        <div class="pt-2 scroll-animate-initial delay-400">
          <button
            type="submit"
            class="relative w-full group overflow-hidden rounded-2xl bg-gray-900 px-8 py-5 text-lg font-bold text-white transition-all duration-300 hover:shadow-[0_20px_40px_-10px_rgba(59,130,246,0.3)] dark:hover:shadow-[0_20px_40px_-10px_rgba(16,185,129,0.3)] active:scale-[0.98]"
          >
            <div
              class="absolute inset-0 bg-gradient-to-r from-primary-blue to-primary-green opacity-0 group-hover:opacity-100 transition-opacity duration-300"
            ></div>
            <span class="relative z-10 flex items-center justify-center gap-3">
              Enviar Mensaje
              <i
                class="fas fa-paper-plane text-sm transition-transform group-hover:translate-x-1 group-hover:-translate-y-1"
              ></i>
            </span>
          </button>
        </div>

        <!-- Status del Formulario -->
        <div
          id="form-status"
          class="mt-4 text-center hidden p-4 rounded-xl font-semibold text-sm animate-fade-in"
        ></div>
      </form>

      <div class="mt-12 pt-8 border-t border-gray-200/30 dark:border-white/10 text-center">
        <p class="text-lg text-gray-600 dark:text-gray-300 mb-6">O si lo prefieres:</p>
        <div
          id="contact-reveal-container"
          class="flex flex-col sm:flex-row items-center justify-center gap-6"
        >
          <button id="reveal-email-btn" class="contact-reveal-button group">
            <i class="fas fa-envelope mr-2 group-hover:scale-110 transition-transform"></i>
            <span>Mostrar Email</span>
          </button>
          <button id="reveal-phone-btn" class="contact-reveal-button group">
            <i class="fas fa-phone mr-2 group-hover:scale-110 transition-transform"></i>
            <span>Mostrar Teléfono</span>
          </button>
        </div>
        <p class="mt-8 text-gray-500 dark:text-gray-400 flex items-center justify-center gap-2">
          <i class="fas fa-map-marker-alt text-primary-blue dark:text-primary-green"></i>
          Madrid, España
        </p>
      </div>
    </div>
  </div>
</div>
