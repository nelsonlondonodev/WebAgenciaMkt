<!-- Chatbot Widget -->
<div id="chat-widget-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col items-end">
  <!-- Invitation Bubble (Desktop only) -->
  <div 
    id="chat-invitation-bubble" 
    class="hidden sm:flex mb-3 mr-2 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border border-white/20 dark:border-gray-700 shadow-xl p-3 rounded-2xl text-sm font-medium text-gray-800 dark:text-white max-w-[220px] animate-fade-in-up relative group"
    style="display: none;"
  >
    <button 
      id="close-chat-invitation" 
      class="absolute -top-2 -left-2 w-6 h-6 bg-white dark:bg-gray-700 rounded-full shadow-md flex items-center justify-center text-gray-500 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity border border-gray-100 dark:border-gray-600"
      aria-label="Cerrar invitación"
    >
      <i class="fas fa-times text-[10px]"></i>
    </button>
    ¡Hola! 👋 Soy Aurelio, ¿en qué puedo ayudarte hoy?
    <!-- Little arrow -->
    <div class="absolute -bottom-2 right-6 w-4 h-4 bg-white/80 dark:bg-gray-800/80 border-r border-b border-white/20 dark:border-gray-700 rotate-45"></div>
  </div>

  <button
    id="chat-widget-button"
    class="bg-primary-blue text-white rounded-full w-16 h-16 flex items-center justify-center shadow-lg hover:bg-primary-green transition-colors animate-bounce relative"
    aria-label="Abrir chat"
  >
    <i class="fas fa-comment-dots fa-2x"></i>
    <!-- Notification Badge -->
    <span 
      id="chat-notification-badge" 
      class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center shadow-md animate-pulse hidden"
    >
      1
    </span>
  </button>
</div>

<div
  id="chat-window"
  class="hidden fixed bottom-24 right-5 left-5 sm:left-auto sm:right-6 sm:bottom-28 sm:w-[400px] bg-white/90 dark:bg-[#0a0a0a]/90 backdrop-blur-2xl border border-white/20 dark:border-white/10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.3)] z-[10001] flex flex-col overflow-hidden transition-all duration-500 ease-in-out origin-bottom-right sm:h-[600px] h-[80vh] max-h-[85vh]"
>
  <!-- Chat Header -->
  <div class="bg-gradient-to-r from-primary-blue to-primary-green p-5 flex justify-between items-center shadow-lg relative overflow-hidden">
    <!-- Subtle pattern or glow -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 blur-3xl rounded-full -mr-16 -mt-16"></div>
    
    <div class="flex items-center space-x-3 relative z-10">
      <div class="relative">
        <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/30 shadow-inner">
          <i class="fas fa-robot text-white text-xl"></i>
        </div>
        <!-- Status dot -->
        <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-primary-green rounded-full animate-pulse"></span>
      </div>
      <div>
        <h3 class="text-white font-bold tracking-wide">Aurelio</h3>
        <p class="text-white/70 text-[10px] uppercase tracking-widest font-black">Asistente Virtual</p>
      </div>
    </div>

    <button
      id="close-chat-window"
      class="w-10 h-10 rounded-full bg-black/10 hover:bg-black/20 text-white flex items-center justify-center transition-all duration-300 backdrop-blur-md group"
      aria-label="Cerrar chat"
    >
      <i class="fas fa-times group-hover:rotate-90 transition-transform duration-500"></i>
    </button>
  </div>

  <!-- Messages Area -->
  <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4 scroll-smooth custom-chatbot-scrollbar relative">
    <!-- Subtle Background Brand Mark -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03] dark:opacity-[0.05]">
      <img src="/image/logo-nelson.webp" alt="" class="w-40 logo-invert-on-dark grayscale">
    </div>
    <!-- Messages will be appended here -->
  </div>

  <!-- Input Area -->
  <div class="p-6 pt-2">
    <div class="relative flex items-center bg-gray-100/50 dark:bg-white/5 rounded-full p-1 border border-gray-200 dark:border-white/10 shadow-sm focus-within:border-primary-green/50 focus-within:bg-white dark:focus-within:bg-white/10 transition-all duration-300">
      <input
        type="text"
        id="chat-input"
        class="flex-1 bg-transparent border-none focus:ring-0 outline-none px-5 py-3 text-sm text-gray-800 dark:text-white placeholder-gray-500"
        placeholder="Escribe tu mensaje aquí..."
      />
      <button
        id="chat-send"
        class="w-11 h-11 bg-primary-blue hover:bg-primary-green text-white rounded-full transition-all duration-500 flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 group"
        aria-label="Enviar mensaje"
      >
        <i class="fas fa-paper-plane group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform duration-300"></i>
      </button>
    </div>
    <p class="text-center text-[9px] text-gray-400 mt-3 uppercase tracking-[0.2em] font-medium">Powered by Nelson Londoño Agencia</p>
  </div>
</div>
